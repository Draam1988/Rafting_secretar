name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: RaftSecretary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Get app version
        id: version
        run: |
          $ver = python -c "import sys; sys.path.insert(0, '.'); from raftsecretary.web.app import APP_VERSION; print(APP_VERSION)"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Windows app
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --windowed --name RaftSecretary --add-data "raftsecretary;raftsecretary" --add-data "data;data" launcher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RaftSecretary-windows-${{ steps.version.outputs.version }}
          path: RaftSecretary/dist/RaftSecretary

      - name: Zip build for release
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist\RaftSecretary\* -DestinationPath dist\RaftSecretary-windows.zip
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            dist\RaftSecretary-windows.zip `
            --title "RaftSecretary ${{ steps.version.outputs.version }}" `
            --notes "## RaftSecretary ${{ steps.version.outputs.version }}`n`nСборка для Windows.`n`nРаспакуйте архив и запустите `RaftSecretary.exe`."
        shell: pwsh
