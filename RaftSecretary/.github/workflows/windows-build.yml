name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip fpdf2 openpyxl pyinstaller

      - name: Build Windows app
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --windowed --name RaftSecretary --add-data "raftsecretary;raftsecretary" --add-data "data;data" launcher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RaftSecretary-windows
          path: dist/RaftSecretary
